<!--
  HERO — INTERACTIVE GRID MASK · v3 PRO
  3 capas reales + scan lines + tilt 3D
-->
<section
  #host
  class="hero"
  (mousemove)="onMove($event, host)"
  (mouseleave)="onLeave(host)"
  (click)="onClick($event, host)">

  <!-- ═══ CAPA 1 — FONDO REAL ═══ -->
  <div class="hero__bg">
    <img
      src="assets/hero/fondo.jpg"
      alt="Nuvant — Tecnología para conectar el bienestar"
      decoding="async"
      fetchpriority="high" />
  </div>

  <!-- ═══ CAPA 2 — OVERLAY ATMOSFÉRICO ═══ -->
  <div class="hero__overlay" aria-hidden="true"></div>

  <!-- ═══ CAPA 3 — SCAN LINES CROSS-HAIR (siguen al cursor) ═══ -->
  <div class="hero__scan" aria-hidden="true"></div>

  <!-- ═══ CAPA 4 — GRID DE CELDAS ═══ -->
  <div class="hero__grid" aria-hidden="true">
    @for (cell of cells; track cell.i) {
      <div
        class="cell"
        [style.--cx]="cell.cx"
        [style.--cy]="cell.cy"></div>
    }
  </div>

  <!-- ═══ CAPA 5 — CONTENIDO (slot opcional) ═══ -->
  <div class="hero__content">
    <div class="hero__hint" aria-hidden="true">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/>
        <path d="M13 13l6 6"/>
      </svg>
      <span>Mueve el cursor — haz click para activar</span>
    </div>
    <ng-content></ng-content>
  </div>

</section>
