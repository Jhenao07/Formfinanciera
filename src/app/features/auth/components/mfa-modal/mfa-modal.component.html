<div class="mfa-backdrop" (click)="cancel()">
  <div class="mfa-modal" (click)="$event.stopPropagation()">

    <!-- Header -->
    <div class="mfa-modal__header">
      <div class="mfa-modal__icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <h2>Verificar Código</h2>
      <p>Introduce los 6 caracteres de seguridad<br>enviados a tu correo.</p>
    </div>

    <!-- Grid de Inputs -->
    <div class="mfa-modal__code" [class.mfa-modal__code--error]="hasError()">
      <input #d0 type="text" maxlength="1" placeholder="·" class="mfa-modal__digit" (input)="onInput($event,0)" (keydown)="onKeyDown($event,0)" (paste)="onPaste($event)"/>
      <input #d1 type="text" maxlength="1" placeholder="·" class="mfa-modal__digit" (input)="onInput($event,1)" (keydown)="onKeyDown($event,1)"/>
      <input #d2 type="text" maxlength="1" placeholder="·" class="mfa-modal__digit" (input)="onInput($event,2)" (keydown)="onKeyDown($event,2)"/>
      <input #d3 type="text" maxlength="1" placeholder="·" class="mfa-modal__digit" (input)="onInput($event,3)" (keydown)="onKeyDown($event,3)"/>
      <input #d4 type="text" maxlength="1" placeholder="·" class="mfa-modal__digit" (input)="onInput($event,4)" (keydown)="onKeyDown($event,4)"/>
      <input #d5 type="text" maxlength="1" placeholder="·" class="mfa-modal__digit" (input)="onInput($event,5)" (keydown)="onKeyDown($event,5)"/>
    </div>

    <!-- Info Adicional -->
    <p class="mfa-modal__hint">El código expira en 5:00 minutos</p>

    <!-- Acciones -->
    <div class="mfa-modal__actions">
      <button type="button" class="mfa-btn mfa-btn--secondary" (click)="cancel()" [disabled]="isSubmitting()">
        Volver
      </button>
      <button type="button" class="mfa-btn mfa-btn--primary" (click)="submit()" [disabled]="isSubmitting()">
        @if (isSubmitting()) {
          <span class="mfa-spinner"></span>
          Verificando...
        } @else {
          Verificar
        }
      </button>
    </div>

  </div>
</div>
